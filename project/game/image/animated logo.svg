<svg id="_레이어_2" data-name="레이어 2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1178.8 589.45">
<defs>
  <style>
    /* 애니메이션 기본 설정 및 easeOutExpo(cubic-bezier) 적용 */
    .letter {
      opacity: 0;
      animation: revealText var(--duration) cubic-bezier(0.19, 1, 0.22, 1) forwards;
    }
    
    @keyframes revealText {
      0% {
        opacity: 0;
        transform: translateX(var(--start-x));
      }
      50% {
        opacity: 1; 
      }
      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* 1. 딜레이 및 이동 거리는 이전 조건(갭 0.5s~0.2s, 이동거리 편차 축소) 그대로 유지
       2. 지속 시간(--duration): 모든 글자가 3.0초 부근에서 움직임을 멈추도록 전체적으로 단축
          (예: char-6은 1.75초에 시작하여 1.25초 동안 움직이므로 정확히 3.0초에 종료)
    */
    .char-1 { animation-delay: 0s;    --start-x: 290px; --duration: 3.0s;  }
    .char-2 { animation-delay: 0.5s;  --start-x: 240px; --duration: 2.5s;  }
    .char-3 { animation-delay: 0.92s; --start-x: 195px; --duration: 2.1s;  }
    .char-4 { animation-delay: 1.27s; --start-x: 155px; --duration: 1.75s; }
    .char-5 { animation-delay: 1.55s; --start-x: 120px; --duration: 1.45s; }
    .char-6 { animation-delay: 1.75s; --start-x: 90px;  --duration: 1.25s; }
  </style>
